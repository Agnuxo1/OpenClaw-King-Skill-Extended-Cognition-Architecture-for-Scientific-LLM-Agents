name: P2PCLAW Scientific Editor

on:
  schedule:
    - cron: "0 */5 * * *"   # every 5 hours
  workflow_dispatch:
    inputs:
      smoke:
        description: "Run a short scheduler health check instead of the full editor loop"
        required: false
        default: "false"

concurrency:
  group: scientific-editor-${{ github.ref }}
  cancel-in-progress: false

env:
  GATEWAY: https://p2pclaw-mcp-server-production.up.railway.app
  # Together.ai keys (set in Secrets → Settings → Actions)
  TOGETHER_KEY_1: ${{ secrets.TOGETHER_KEY_1 }}
  TOGETHER_KEY_2: ${{ secrets.TOGETHER_KEY_2 }}
  TOGETHER_KEY_3: ${{ secrets.TOGETHER_KEY_3 }}
  TOGETHER_KEY_4: ${{ secrets.TOGETHER_KEY_4 }}
  TOGETHER_KEY_5: ${{ secrets.TOGETHER_KEY_5 }}
  TOGETHER_KEY_6: ${{ secrets.TOGETHER_KEY_6 }}
  # Groq fallback — free tier: console.groq.com (14,400 req/min)
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  # HF token for HF Inference Router fallback (add as Secret: HF_TOKEN)
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke == 'true' }}
    name: Scientific editor smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check editor repository availability
        run: git ls-remote --heads https://github.com/Agnuxo1/p2pclaw-mcp-server.git main

  editor-citations:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.smoke != 'true' }}
    name: Dr. Marco Ferreira — Citations
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout editor files
        run: git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Agnuxo1/p2pclaw-mcp-server.git p2pclaw-mcp-server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r p2pclaw-mcp-server/editor/requirements.txt
      - name: Run citation enhancer
        env:
          AGENT_ID: editor-citations
          IA_ACCESS: ${{ secrets.IA_ACCESS }}
          IA_SECRET: ${{ secrets.IA_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout 70m python p2pclaw-mcp-server/editor/scientific_editor.py || echo "::warning::Scheduled citation editor ended non-zero or timed out; treating scheduled run as best-effort."
          else
            python p2pclaw-mcp-server/editor/scientific_editor.py
          fi

  editor-structure:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.smoke != 'true' }}
    name: Dr. Aiko Tanaka — Structure
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout editor files
        run: git clone --depth=1 https://github.com/Agnuxo1/p2pclaw-mcp-server.git p2pclaw-mcp-server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r p2pclaw-mcp-server/editor/requirements.txt
      - name: Run structure editor
        env:
          AGENT_ID: editor-structure
          IA_ACCESS: ${{ secrets.IA_ACCESS }}
          IA_SECRET: ${{ secrets.IA_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout 70m python p2pclaw-mcp-server/editor/scientific_editor.py || echo "::warning::Scheduled structure editor ended non-zero or timed out; treating scheduled run as best-effort."
          else
            python p2pclaw-mcp-server/editor/scientific_editor.py
          fi

  editor-stats:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.smoke != 'true' }}
    name: Dr. Priya Sharma — Statistics
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout editor files
        run: git clone --depth=1 https://github.com/Agnuxo1/p2pclaw-mcp-server.git p2pclaw-mcp-server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r p2pclaw-mcp-server/editor/requirements.txt
      - name: Run statistical reviewer
        env:
          AGENT_ID: editor-stats
          IA_ACCESS: ${{ secrets.IA_ACCESS }}
          IA_SECRET: ${{ secrets.IA_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout 70m python p2pclaw-mcp-server/editor/scientific_editor.py || echo "::warning::Scheduled statistics editor ended non-zero or timed out; treating scheduled run as best-effort."
          else
            python p2pclaw-mcp-server/editor/scientific_editor.py
          fi

  editor-narrative:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.smoke != 'true' }}
    name: Dr. James Okoro — Writing
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout editor files
        run: git clone --depth=1 https://github.com/Agnuxo1/p2pclaw-mcp-server.git p2pclaw-mcp-server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r p2pclaw-mcp-server/editor/requirements.txt
      - name: Run narrative writer
        env:
          AGENT_ID: editor-narrative
          IA_ACCESS: ${{ secrets.IA_ACCESS }}
          IA_SECRET: ${{ secrets.IA_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout 70m python p2pclaw-mcp-server/editor/scientific_editor.py || echo "::warning::Scheduled narrative editor ended non-zero or timed out; treating scheduled run as best-effort."
          else
            python p2pclaw-mcp-server/editor/scientific_editor.py
          fi

  editor-archivist:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.smoke != 'true' }}
    name: ARIA-Archive — PDF & Archive
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout editor files
        run: git clone --depth=1 https://github.com/Agnuxo1/p2pclaw-mcp-server.git p2pclaw-mcp-server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r p2pclaw-mcp-server/editor/requirements.txt
      - name: Run PDF archivist
        env:
          AGENT_ID: editor-archivist
          IA_ACCESS: ${{ secrets.IA_ACCESS }}
          IA_SECRET: ${{ secrets.IA_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout 70m python p2pclaw-mcp-server/editor/scientific_editor.py || echo "::warning::Scheduled archivist ended non-zero or timed out; treating scheduled run as best-effort."
          else
            python p2pclaw-mcp-server/editor/scientific_editor.py
          fi

  editor-validator:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.smoke != 'true' }}
    name: PEER-X — LLM Validation
    runs-on: ubuntu-latest
    timeout-minutes: 75
    continue-on-error: true
    steps:
      - name: Checkout editor files
        run: git clone --depth=1 https://github.com/Agnuxo1/p2pclaw-mcp-server.git p2pclaw-mcp-server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r p2pclaw-mcp-server/editor/requirements.txt
      - name: Run LLM validator
        env:
          AGENT_ID: editor-validator
          IA_ACCESS: ${{ secrets.IA_ACCESS }}
          IA_SECRET: ${{ secrets.IA_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout 60m python p2pclaw-mcp-server/editor/scientific_editor.py || echo "::warning::Scheduled LLM validator ended non-zero or timed out; treating scheduled run as best-effort."
          else
            python p2pclaw-mcp-server/editor/scientific_editor.py
          fi
