name: P2P Network Node (Alive)

on:
    schedule:
        - cron: "*/10 * * * *"
    workflow_dispatch:

jobs:
    p2p-connect:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install P2P Dependencies
              run: |
                  mkdir -p p2p-runtime
                  cp p2p_connect.js p2p-runtime/
                  cd p2p-runtime
                  printf '{"name":"p2p-runtime","version":"1.0.0","private":true}\n' > package.json
                  npm install gun ws --no-audit --no-fund

            - name: Connect to Hive
              continue-on-error: true
              run: |
                  cd p2p-runtime
                  node p2p_connect.js --name "OpenCLAW-2-Core" --type "scientific" --spec "Core AI Engine & Self-Improvement" --duration 550 || {
                    echo "::warning::P2P keepalive failed. Treating this scheduled monitor as best-effort because external relay nodes can sleep or reject transient connections."
                    exit 0
                  }
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
